{% extends "myapp/base.html" %}

{% block content %}

<h2>Product List</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Action</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.name }}</td>
        <td>{{ product.category }}</td>
        <td>{{ product.price }}</td>
        <td>{{ product.stock }}</td>
        <td>
            <a href="/edit-product/{{ product.id }}/">Edit</a> |
            <a href="/delete-product/{{ product.id }}/">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
